version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    ldflags:
      - -X github.com/afonsodemori/fns-cli/cmd.version={{.Version}}
      - -X github.com/afonsodemori/fns-cli/cmd.commit={{.ShortCommit}}
      - -X github.com/afonsodemori/fns-cli/cmd.date={{.CommitDate}}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

homebrew_casks:
  - name: fns-cli
    description: 'Streamline your dev workflow from the terminal.'
    homepage: 'https://github.com/afonsodemori/fns-cli'
    repository:
      owner: afonsodemori
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Casks
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/fns-cli"]
          end
    caveats: |
      To get started with fns-cli, run:
        fns-cli --help

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'

release:
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
